version: '3.9'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: attune_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: attune
      POSTGRES_PASSWORD: attune
      POSTGRES_DB: attune
    ports:
      - '5432:5432'
    volumes:
      - attune_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: attune_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - attune_redis:/data

volumes:
  attune_pgdata:
  attune_redis:
